<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resultados de búsqueda — Moodflix</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/card.css" />
</head>

<body>
  <header class="navbar" role="banner">
    <div class="navbar__inner">
      <a href="../index.html" class="navbar__logo" aria-label="Moodflix — Ir al inicio">
        <span class="logo__icon" aria-hidden="true">◈</span>
        <span class="logo__text">Moodflix</span>
      </a>

      <div class="navbar__search" role="search">
        <label for="search-input" class="sr-only">Buscar películas o música</label>
        <input id="search-input" type="search" class="search__input" placeholder="Buscar títulos, géneros…"
          aria-label="Buscar películas o música" autocomplete="off" />
        <button class="search__btn" aria-label="Ejecutar búsqueda">
          <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </button>
      </div>

      <nav class="navbar__nav" aria-label="Navegación principal">
        <ul class="nav__list" role="list">
          <li><a href="../index.html" class="nav__link">Inicio</a></li>
          <li><a href="/pages/favorites.html" class="nav__link">Favoritos</a></li>
          <li><a href="/pages/user.html" class="nav__link">Perfil</a></li>
        </ul>
      </nav>

      <button class="navbar__hamburger" id="menu-toggle" aria-controls="mobile-menu" aria-expanded="false"
        aria-label="Abrir menú de navegación">
        <span class="hamburger__bar"></span>
        <span class="hamburger__bar"></span>
        <span class="hamburger__bar"></span>
      </button>
    </div>

    <nav class="mobile-menu" id="mobile-menu" aria-label="Menú móvil" hidden>
      <ul class="mobile-menu__list" role="list">
        <li><a href="../index.html" class="mobile-menu__link">Inicio</a></li>
        <li><a href="/pages/favorites.html" class="mobile-menu__link">Favoritos</a></li>
        <li><a href="/pages/user.html" class="mobile-menu__link">Perfil</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="results" aria-labelledby="results-heading">
      <div class="results__header">
        <h2 id="results-heading" class="results__title">Resultados de búsqueda</h2>
        <p class="results__subtitle">Resultados para <strong class="search-results__query">...</strong></p>
      </div>

      <ul class="cards-grid" role="list" aria-label="Resultados de búsqueda"></ul>
    </section>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="footer__inner">
      <a href="../index.html" class="footer__logo" aria-label="Moodflix — volver al inicio">
        <span class="logo__icon" aria-hidden="true">◈</span>
        <span class="logo__text">Moodflix</span>
      </a>
      <nav class="footer__nav" aria-label="Navegación legal">
        <ul class="footer__list" role="list">
          <li><a href="/terminos" class="footer__link">Términos</a></li>
          <li><a href="/privacidad" class="footer__link">Privacidad</a></li>
        </ul>
      </nav>
      <p class="footer__copy">© 2026 Moodflix — Todos los derechos reservados</p>
    </div>
  </footer>

  <script src="/assets/js/main.js" type="module" defer></script>
  <script src="/assets/js/search-page.js" type="module" defer></script>
  <script src="/assets/js/search.js" type="module" defer></script>
</body>

</html>
