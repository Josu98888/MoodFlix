<!DOCTYPE html>
<html lang='es'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Perfil - Moodflix</title>
    <link rel='stylesheet' href='../assets/css/user.css'>
</head>
<body>
    <header>
        <img src="" alt="Foto de perfil" id="profile-pic">
        <h1>Perfil de Usuario</h1>
        <h2 id="mood-title"></h2>
    </header>

    <main>
        <h2>Como estas hoy?</h2>
            <ul>
                <li><button id="happy">Alegre</button></li>
                <li><button id="sad">Triste</button></li>
                <li><button id="neutral">Neutro</button></li>
                <li><button id="angry">Enojado</button></li>
                <li><button id="anxius">Ansioso</button></li>
                <li><button id="relax">Relajado</button></li>
            </ul>
        <h2>Mis favoritos</h2>
        <ul id="fav-list"></ul>
    </main>
    
    <script src='../assets/js/user.js'></script>
</body>
</html>
