<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Perfil - Moodflix</title>
    <link rel="stylesheet" href="../assets/css/user.css">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/base.css">
</head>

<body>
    <main class="profile" id="main-content">

        <nav class="profile-nav" aria-label="Navegación del perfil">
            <a href="../index.html" class="profile-nav__back" aria-label="Volver al inicio">
                <span class="profile-nav__arrow" aria-hidden="true">←</span>
             </a>

             <a href="../index.html" class="profile-nav__logo" aria-label="Moodflix - Ir al inicio">
                 <span class="profile-nav__logo-icon" aria-hidden="true">◈</span>
                 <span class="profile-nav__logo-text">Moodflix</span>
            </a>
        </nav>

        <header class="profile__header">
            <div class="profile__avatar" id="profile-pic" aria-hidden="true">M</div>
            <p class="profile__eyebrow"></p>
            <h1>Perfil de Usuario</h1>
            <p id="mood-title" class="profile__mood" aria-live="polite">Elegí cómo te sentís hoy</p>
        </header>

        <section class="mood-panel" aria-labelledby="mood-heading">
            <div class="section-heading">
                <p class="section-heading__eyebrow">Estado de ánimo</p>
                <h2 id="mood-heading">¿Cómo estás hoy?</h2>
            </div>

            <div class="mood-grid" id="mood-options" role="group" aria-label="Opciones de estado de ánimo">
                <button class="mood-btn" type="button" data-mood="feliz" aria-pressed="false">
                    <span class="mood-btn__emoji" aria-hidden="true">😊</span>
                    <span class="mood-btn__label">Feliz</span>
                </button>
                <button class="mood-btn" type="button" data-mood="melancolico" aria-pressed="false">
                    <span class="mood-btn__emoji" aria-hidden="true">🌧️</span>
                    <span class="mood-btn__label">Melancólico</span>
                </button>
                <button class="mood-btn" type="button" data-mood="energetico" aria-pressed="false">
                    <span class="mood-btn__emoji" aria-hidden="true">⚡</span>
                    <span class="mood-btn__label">Energético</span>
                </button>
                <button class="mood-btn" type="button" data-mood="relajado" aria-pressed="false">
                    <span class="mood-btn__emoji" aria-hidden="true">🌙</span>
                    <span class="mood-btn__label">Relajado</span>
                </button>
                <button class="mood-btn" type="button" data-mood="inspirado" aria-pressed="false">
                    <span class="mood-btn__emoji" aria-hidden="true">✨</span>
                    <span class="mood-btn__label">Inspirado</span>
                </button>
                <button class="mood-btn" type="button" data-mood="nostalgico" aria-pressed="false">
                    <span class="mood-btn__emoji" aria-hidden="true">🎞️</span>
                    <span class="mood-btn__label">Nostálgico</span>
                </button>
            </div>
        </section>

        <section class="history-panel" aria-labelledby="history-heading">
            <div class="section-heading">
                <p class="section-heading__eyebrow">Últimos registros</p>
                <h2 id="history-heading">Historial emocional</h2>
            </div>
            <ul id="mood-history" class="history-list" aria-label="Últimos estados de ánimo"></ul>
        </section>

        <p id="mood-announcement" class="sr-only" aria-live="polite"></p>
    </main>

    <!-- footer -->
    <footer class="footer" role="contentinfo">
        <div class="footer__inner">

            <!-- Logo footer -->
            <a href="/" class="footer__logo" aria-label="Moodflix — volver al inicio">
                <span class="logo__icon" aria-hidden="true">◈</span>
                <span class="logo__text">Moodflix</span>
            </a>

            <!-- Links legales -->
            <nav class="footer__nav" aria-label="Navegación legal">
                <ul class="footer__list" role="list">
                    <li><a href="/terminos" class="footer__link">Términos</a></li>
                    <li><a href="/privacidad" class="footer__link">Privacidad</a></li>
                </ul>
            </nav>

            <!-- Copyright -->
            <p class="footer__copy">© 2026 Moodflix — Todos los derechos reservados</p>

        </div>
    </footer>

    <script src="../assets/js/user.js"></script>
</body>

</html>
